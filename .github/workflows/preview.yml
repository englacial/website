name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  pull-requests: write
  contents: read

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync

      - name: Render
        run: QUARTO_PYTHON=.venv/bin/python quarto render

      - name: Deploy to Surge
        id: surge
        run: |
          npm install -g surge
          DOMAIN="website-pr-${{ github.event.pull_request.number }}.surge.sh"
          surge ./docs $DOMAIN --token ${{ secrets.SURGE_TOKEN }}
          echo "url=https://$DOMAIN" >> $GITHUB_OUTPUT

      - name: Post or update preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const url = '${{ steps.surge.outputs.url }}';
            const body = `**Preview:** ${url}\n\nCommit: \`${sha}\``;
            const marker = '**Preview:**';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

  teardown-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Tear down Surge preview
        run: |
          npm install -g surge
          surge teardown website-pr-${{ github.event.pull_request.number }}.surge.sh --token ${{ secrets.SURGE_TOKEN }}
