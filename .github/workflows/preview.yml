name: Preview

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [closed]

permissions:
  pull-requests: write
  contents: read
  actions: read

jobs:
  deploy-preview:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/preview')
    runs-on: ubuntu-latest
    steps:
      - name: Get PR SHA and acknowledge
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('sha', pr.head.sha);
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.sha }}

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render
        run: quarto render

      - name: Deploy to Surge
        id: surge
        run: |
          npm install -g surge
          DOMAIN="website-pr-${{ github.event.issue.number }}.surge.sh"
          surge ./docs $DOMAIN --token ${{ secrets.SURGE_TOKEN }}
          echo "url=https://$DOMAIN" >> $GITHUB_OUTPUT

      - name: Post preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ steps.pr.outputs.sha }}'.substring(0, 7);
            const url = '${{ steps.surge.outputs.url }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `**Preview ready:** ${url}\n\nCommit: \`${sha}\``
            });

  teardown-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Tear down Surge preview
        run: |
          npm install -g surge
          surge teardown website-pr-${{ github.event.pull_request.number }}.surge.sh --token ${{ secrets.SURGE_TOKEN }}
