
<style>
  .cr{display:flex;align-items:center;gap:12px;margin:0 0 10px;font-size:13px;color:var(--color-text-secondary)}
  .cr label{min-width:80px}
  .cr span.v{min-width:56px;text-align:right;font-weight:500;font-size:14px;color:var(--color-text-primary)}
</style>

<svg id="viz" width="100%" viewBox="0 0 680 240"></svg>

<div class="cr" style="margin-top:12px">
  <label>Cell size</label>
  <input type="range" id="cellSlider" min="0" max="10" value="4" step="1" style="flex:1" oninput="update()">
  <span class="v" id="cellVal">15 km</span>
</div>
<div class="cr">
  <label>Flight lines</label>
  <input type="range" id="lineSlider" min="2" max="40" value="18" step="1" style="flex:1" oninput="regen()">
  <span class="v" id="lineVal">18</span>
</div>

<script>
const AREA=120,SZ=180,GAP=18;
const P1X=10,P2X=P1X+SZ+GAP,P3X=P2X+SZ+GAP,PY=28;
const CBX=P3X+SZ+10,CBW=12;
const CELLS=[6,8,10,12,15,20,24,30,40,60,120];
const VMIN=1,VMAX=100;
let flights=[],hovCell=null,seed=77;
const LC=['#D85A30','#1D9E75','#378ADD','#D4537E','#BA7517','#534AB7','#639922','#E24B4A','#888780','#0F6E56','#993C1D','#185FA5','#993556','#854F0B','#3C3489','#3B6D11','#A32D2D','#D85A30','#1D9E75','#378ADD','#D4537E','#BA7517','#534AB7','#639922','#E24B4A','#888780','#0F6E56','#993C1D','#185FA5','#993556','#854F0B','#3C3489','#3B6D11','#A32D2D','#D85A30','#1D9E75','#378ADD','#D4537E','#BA7517','#534AB7'];

function pr(s){s=(s*16807)%2147483647;return{v:(s-1)/2147483646,s}}
function gen(n){flights=[];let s=seed;for(let i=0;i<n;i++){let r;r=pr(s);s=r.s;const a=r.v*Math.PI;r=pr(s);s=r.s;const cx=r.v*AREA;r=pr(s);s=r.s;const cy=r.v*AREA;const dx=Math.cos(a)*AREA,dy=Math.sin(a)*AREA;flights.push({x1:cx-dx,y1:cy-dy,x2:cx+dx,y2:cy+dy});}}
function clip(lx1,ly1,lx2,ly2,rx,ry,rw,rh){let t0=0,t1=1;const dx=lx2-lx1,dy=ly2-ly1;for(const[p,q]of[[-dx,lx1-rx],[dx,rx+rw-lx1],[-dy,ly1-ry],[dy,ry+rh-ly1]]){if(p===0){if(q<0)return null}else{const r=q/p;if(p<0){if(r>t1)return null;if(r>t0)t0=r}else{if(r<t0)return null;if(r<t1)t1=r}}}return{x1:lx1+t0*dx,y1:ly1+t0*dy,x2:lx1+t1*dx,y2:ly1+t1*dy};}
function dst(c){return Math.sqrt((c.x2-c.x1)**2+(c.y2-c.y1)**2)}
function k2p(v){return v*(SZ/AREA)}
function spc2col(sp){if(sp===Infinity)return'rgba(128,128,128,0.1)';const t=Math.max(0,Math.min(1,(Math.log10(sp)-Math.log10(VMIN))/(Math.log10(VMAX)-Math.log10(VMIN))));const st=[{t:0,r:4,g:52,b:44},{t:.2,r:15,g:110,b:86},{t:.4,r:55,g:170,b:130},{t:.6,r:239,g:159,b:39},{t:.8,r:186,g:117,b:23},{t:1,r:113,g:47,b:11}];let i=0;for(;i<st.length-2;i++)if(t<=st[i+1].t)break;const a=st[i],b=st[i+1],f=(t-a.t)/(b.t-a.t);return`rgb(${Math.round(a.r+(b.r-a.r)*f)},${Math.round(a.g+(b.g-a.g)*f)},${Math.round(a.b+(b.b-a.b)*f)})`;}

function regen(){const n=parseInt(document.getElementById('lineSlider').value);document.getElementById('lineVal').textContent=n;gen(n);update();}

function update(){
  const ci=parseInt(document.getElementById('cellSlider').value);
  const cellKm=CELLS[ci];
  document.getElementById('cellVal').textContent=cellKm+' km';
  const svg=document.getElementById('viz');
  const nC=AREA/cellKm,cPx=SZ/nC;

  const cd=[];
  for(let r=0;r<nC;r++){cd[r]=[];for(let c=0;c<nC;c++){
    let tk=0;const cl=[];
    for(let fi=0;fi<flights.length;fi++){const seg=clip(flights[fi].x1,flights[fi].y1,flights[fi].x2,flights[fi].y2,c*cellKm,r*cellKm,cellKm,cellKm);if(seg){tk+=dst(seg);cl.push({...seg,fi});}}
    cd[r][c]={tk,eq:tk>0?2*cellKm*cellKm/tk:Infinity,cl};
  }}

  let h=`<defs>`;
  for(let r=0;r<nC;r++)for(let c=0;c<nC;c++){
    h+=`<clipPath id="a${r}_${c}"><rect x="${P1X+c*cPx}" y="${PY+r*cPx}" width="${cPx}" height="${cPx}"/></clipPath>`;
    h+=`<clipPath id="b${r}_${c}"><rect x="${P2X+c*cPx}" y="${PY+r*cPx}" width="${cPx}" height="${cPx}"/></clipPath>`;
  }
  h+=`</defs>`;

  [P1X,P2X,P3X].forEach(px=>{h+=`<rect x="${px}" y="${PY}" width="${SZ}" height="${SZ}" rx="2" fill="#f0f0f0" stroke="var(--color-border-secondary)" stroke-width="0.5"/>`;});
  h+=`<text class="ts" x="${P1X+SZ/2}" y="${PY-10}" text-anchor="middle">Flight lines</text>`;
  h+=`<text class="ts" x="${P2X+SZ/2}" y="${PY-10}" text-anchor="middle">Equivalent grid</text>`;
  h+=`<text class="ts" x="${P3X+SZ/2}" y="${PY-10}" text-anchor="middle">Survey density</text>`;

  for(let r=0;r<nC;r++)for(let c=0;c<nC;c++){
    const d=cd[r][c];
    h+=`<g clip-path="url(#a${r}_${c})">`;
    d.cl.forEach(seg=>{h+=`<line x1="${P1X+k2p(seg.x1)}" y1="${PY+k2p(seg.y1)}" x2="${P1X+k2p(seg.x2)}" y2="${PY+k2p(seg.y2)}" stroke="${LC[seg.fi]}" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>`;});
    h+=`</g>`;

    const rx=P2X+c*cPx,ry=PY+r*cPx;
    if(d.eq<Infinity){const sp=k2p(d.eq);h+=`<g clip-path="url(#b${r}_${c})">`;
      if(sp>1.5){const n=Math.ceil(cellKm/d.eq);for(let i=1;i<=n&&i<50;i++){const o=i*sp;h+=`<line x1="${rx}" y1="${ry+o}" x2="${rx+cPx}" y2="${ry+o}" stroke="#378ADD" stroke-width="0.7" opacity="0.5"/>`;h+=`<line x1="${rx+o}" y1="${ry}" x2="${rx+o}" y2="${ry+cPx}" stroke="#378ADD" stroke-width="0.7" opacity="0.5"/>`;}}
      else{h+=`<rect x="${rx}" y="${ry}" width="${cPx}" height="${cPx}" fill="#378ADD" opacity="0.18"/>`;}
    h+=`</g>`;}

    h+=`<rect x="${P3X+c*cPx}" y="${PY+r*cPx}" width="${cPx}" height="${cPx}" fill="${spc2col(d.eq)}"/>`;

    if(hovCell&&hovCell[0]===r&&hovCell[1]===c){[P1X,P2X,P3X].forEach(px=>{h+=`<rect x="${px+c*cPx}" y="${PY+r*cPx}" width="${cPx}" height="${cPx}" fill="none" stroke="var(--color-text-primary)" stroke-width="1.5"/>`;});}
  }

  for(let i=0;i<=nC;i++){const y=PY+i*cPx;[P1X,P2X,P3X].forEach(px=>{h+=`<line x1="${px}" y1="${y}" x2="${px+SZ}" y2="${y}" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>`;h+=`<line x1="${px+i*cPx}" y1="${PY}" x2="${px+i*cPx}" y2="${PY+SZ}" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>`;});}

  const cbY=PY;
  for(let i=0;i<64;i++){const t=i/64,sp=Math.pow(10,Math.log10(VMIN)+t*(Math.log10(VMAX)-Math.log10(VMIN)));h+=`<rect x="${CBX}" y="${cbY+t*SZ}" width="${CBW}" height="${SZ/64+.5}" fill="${spc2col(sp)}"/>`;};
  h+=`<rect x="${CBX}" y="${cbY}" width="${CBW}" height="${SZ}" fill="none" stroke="var(--color-border-tertiary)" stroke-width="0.5" rx="2"/>`;
  for(const v of[1,2,5,10,20,50,100]){const t=(Math.log10(v)-Math.log10(VMIN))/(Math.log10(VMAX)-Math.log10(VMIN)),ty=cbY+t*SZ;h+=`<line x1="${CBX+CBW}" y1="${ty}" x2="${CBX+CBW+3}" y2="${ty}" stroke="var(--color-text-secondary)" stroke-width="0.5"/>`;h+=`<text x="${CBX+CBW+6}" y="${ty+1}" dominant-baseline="central" style="font-size:10px;fill:var(--color-text-secondary)">${v}</text>`;}
  h+=`<text x="${CBX+CBW/2}" y="${cbY+SZ+14}" text-anchor="middle" style="font-size:10px;fill:var(--color-text-secondary)">km</text>`;

  for(let r=0;r<nC;r++)for(let c=0;c<nC;c++){[P1X,P2X,P3X].forEach(px=>{h+=`<rect x="${px+c*cPx}" y="${PY+r*cPx}" width="${cPx}" height="${cPx}" fill="transparent" data-r="${r}" data-c="${c}" style="cursor:pointer"/>`;});}

  svg.setAttribute('viewBox',`0 0 680 ${PY+SZ+24}`);
  svg.innerHTML=h;
  svg.querySelectorAll('rect[data-r]').forEach(el=>{el.addEventListener('mouseenter',()=>{hovCell=[+el.dataset.r,+el.dataset.c];update()});el.addEventListener('mouseleave',()=>{hovCell=null;update()});});
}

gen(18);update();
</script>
